<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Calm Space VR</title>

  <link rel="preconnect"
  href="https://fonts.googleapis.com">

  <link rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
  rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:'Poppins',sans-serif;

      min-height:100vh;

      background:
      linear-gradient(
      rgba(2,6,23,0.85),
      rgba(2,6,23,0.92)
      ),
      url('../assets/images/calm-bg.jpg');

      background-size:cover;
      background-position:center;

      color:white;

     overflow-x:hidden;
     overflow-y:auto;

      display:flex;
      justify-content:center;
      align-items:center;

      text-align:center;

      padding:30px;

    }

    .container{

      width:100%;
      max-width:900px;

      background:rgba(255,255,255,0.08);

      border:1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(15px);

      border-radius:30px;

      padding:50px;

      box-shadow:
      0 0 30px rgba(0,255,255,0.1);

    }

    h1{

      font-size:58px;

      margin-bottom:20px;

      background:
      linear-gradient(to right,cyan,#60a5fa);

      background-clip:text;
      -webkit-background-clip:text;

      color:transparent;
      -webkit-text-fill-color:transparent;

    }

    .subtitle{

      color:#cbd5e1;

      line-height:1.8;

      margin-bottom:40px;

      font-size:18px;

    }

    .breathing-circle{

      width:220px;
      height:220px;

      border-radius:50%;

      margin:auto;

      background:
      radial-gradient(circle,
      cyan,
      #2563eb);

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:28px;
      font-weight:600;

      animation:breathe 8s infinite;

      box-shadow:
      0 0 50px cyan,
      0 0 120px rgba(0,255,255,0.3);

    }

    @keyframes breathe{

      0%{
        transform:scale(1);
      }

      50%{
        transform:scale(1.35);
      }

      100%{
        transform:scale(1);
      }

    }

    .affirmation{

      margin-top:40px;

      font-size:24px;

      color:#e2e8f0;

      min-height:60px;

    }

    .controls{

      margin-top:40px;

      display:flex;
      justify-content:center;
      flex-wrap:wrap;

      gap:20px;

    }

    button{

      padding:16px 28px;

      border:none;

      border-radius:50px;

      cursor:pointer;

      font-size:16px;

      font-weight:600;

      transition:0.4s;

      background:
      linear-gradient(
      135deg,
      cyan,
      #2563eb
      );

      color:white;

    }

    button:hover{

      transform:translateY(-5px);

      box-shadow:
      0 0 20px cyan;

    }

    .timer{

      margin-top:35px;

      font-size:32px;

      color:cyan;

    }

    .status{

      margin-top:25px;

      color:#cbd5e1;

      font-size:18px;

    }

    @media(max-width:768px){

      h1{
        font-size:42px;
      }

      .breathing-circle{

        width:180px;
        height:180px;

        font-size:22px;

      }

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>🧘 Calm Space VR</h1>

    <p class="subtitle">

      Relax your mind with guided breathing,
      calming sounds, meditation,
      and peaceful interaction.

    </p>


    <div class="breathing-circle"
    id="circleText">

      Breathe In

    </div>


    <div class="affirmation"
    id="affirmation">

      You are calm and safe.

    </div>


    <div class="controls">

      <button onclick="startMeditation()">
        ▶ Start Session
      </button>

      <button onclick="pauseMusic()">
        ⏸ Pause Music
      </button>

      <button onclick="playMusic()">
        🎵 Play Music
      </button>

      <button onclick="speakMeditation()">
        🔊 Voice Guide
      </button>

    </div>


    <div class="controls">

      <button onclick="startTimer(60)">
        1 Minute
      </button>

      <button onclick="startTimer(300)">
        5 Minutes
      </button>

      <button onclick="startTimer(600)">
        10 Minutes
      </button>

    </div>


    <div class="timer"
    id="timer">

      00:00

    </div>


    <div class="status"
    id="status">

      Waiting to begin meditation...

    </div>


    <audio id="calmAudio" loop>

      <source
      src="../assets/audio/calm-music.mp3"
      type="audio/mpeg">

    </audio>

  </div>



  <script>

    const affirmations = [

      'You are calm and safe.',

      'Take a deep breath.',

      'Everything is going to be okay.',

      'Relax your thoughts.',

      'Focus on the present moment.',

      'Your mind deserves peace.'

    ];



    let affirmationIndex = 0;



    // CHANGE AFFIRMATIONS

    setInterval(()=>{

      affirmationIndex++;

      if(
      affirmationIndex >= affirmations.length
      ){

        affirmationIndex = 0;

      }

      document
      .getElementById('affirmation')
      .innerText =
      affirmations[affirmationIndex];

    },5000);




    // BREATHING TEXT

    const circleText =
    document.getElementById('circleText');

    let inhale = true;

    setInterval(()=>{

      if(inhale){

        circleText.innerText =
        'Breathe In';

      }

      else{

        circleText.innerText =
        'Breathe Out';

      }

      inhale = !inhale;

    },4000);




    // MUSIC

    const audio =
    document.getElementById('calmAudio');


    function playMusic(){

      audio.play();

      document
      .getElementById('status')
      .innerText =
      '🎵 Calm music playing...';

    }


    function pauseMusic(){

      audio.pause();

      document
      .getElementById('status')
      .innerText =
      '⏸ Music paused';

    }




    // START SESSION

    function startMeditation(){

      playMusic();

      speakMeditation();

      document
      .getElementById('status')
      .innerText =
      '🧘 Meditation session started';

    }




    // VOICE GUIDE

    function speakMeditation(){

      const speech =
      new SpeechSynthesisUtterance(

      'Welcome to Calm Space. Relax your body. Take a deep breath in. Slowly breathe out. Focus only on your breathing.'

      );

      speech.rate = 0.85;

      speech.pitch = 1;

      speech.volume = 1;

      speechSynthesis.speak(speech);

    }




    // TIMER

    let countdown;


    function startTimer(seconds){

      clearInterval(countdown);

      let time = seconds;

      updateTimerDisplay(time);

      countdown =
      setInterval(()=>{

        time--;

        updateTimerDisplay(time);

        if(time <= 0){

          clearInterval(countdown);

          document
          .getElementById('status')
          .innerText =
          '✅ Meditation complete';

          speechSynthesis.speak(

            new SpeechSynthesisUtterance(

            'Meditation session complete. Hope you feel relaxed.'

            )

          );

        }

      },1000);

    }



    function updateTimerDisplay(time){

      const minutes =
      Math.floor(time / 60);

      const seconds =
      time % 60;

      document
      .getElementById('timer')
      .innerText =

      `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;

    }

  </script>

</body>
</html>
